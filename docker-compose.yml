# gateway/docker-compose.yml

version: '3.8'

services:
  gateway:
    image: offinhealthcare/gateway:1.0.0
    container_name: offin-gateway
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - TENANT_ID=${TENANT_ID}
      - API_KEY=${API_KEY}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      - CLOUD_URL=${CLOUD_URL:-https://api.offinhealthcare.com}
      - SYNC_INTERVAL=${SYNC_INTERVAL:-300000}
      - HL7_ENABLED=${HL7_ENABLED:-false}
      - HL7_PORT=${HL7_PORT:-6661}
      - GATEWAY_PORT=${GATEWAY_PORT:-8080}
      - DASHBOARD_USERNAME=${DASHBOARD_USERNAME:-admin}
      - DASHBOARD_PASSWORD=${DASHBOARD_PASSWORD}
      - LOG_LEVEL=${LOG_LEVEL:-info}
    volumes:
      - gateway-data:/app/data
      - gateway-drop:/app/drop-folder
      - gateway-backups:/app/backups
      - gateway-logs:/app/logs
      - /etc/localtime:/etc/localtime:ro
    ports:
      - "${GATEWAY_PORT:-8080}:8080"
      - "${HL7_PORT:-6661}:6661"
    networks:
      - hospital-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M

  # Optional: Local database backup service
  backup:
    image: offinhealthcare/gateway:1.0.0
    container_name: offin-gateway-backup
    restart: unless-stopped
    entrypoint: ["node", "scripts/backup.js", "--schedule"]
    environment:
      - NODE_ENV=production
      - BACKUP_FOLDER=/app/backups
      - DB_PATH=/app/data/offin.db
    volumes:
      - gateway-data:/app/data:ro
      - gateway-backups:/app/backups
    depends_on:
      - gateway
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  gateway-data:
    name: offin-gateway-data
  gateway-drop:
    name: offin-gateway-drop
  gateway-backups:
    name: offin-gateway-backups
  gateway-logs:
    name: offin-gateway-logs

networks:
  hospital-network:
    driver: bridge
    name: offin-hospital-network